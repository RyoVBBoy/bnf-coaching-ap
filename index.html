<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNF COACHING APP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2a2a2a;
            --primary-color: #d500f9; 
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --status-color: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            padding: 15px; text-align: center;
            font-size: 1.2rem; font-weight: bold;
            color: var(--primary-color);
            border-bottom: 1px solid #333;
        }

        .content-area {
            flex: 1; overflow-y: auto;
            padding: 20px; padding-bottom: 90px;
            box-sizing: border-box;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background-color: var(--card-bg); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #333; z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); cursor: pointer; width: 25%; height: 100%;
            transition: all 0.2s ease;
        }
        .nav-item i { font-size: 1.3rem; transition: transform 0.2s ease; }
        .nav-item span { font-size: 0.75rem; margin-top: 3px; display: none; }
        
        .nav-item.active { color: var(--primary-color); }
        .nav-item.active i { transform: translateY(-2px); }
        .nav-item.active span { display: inline; } 

        .card {
            background-color: var(--card-bg); padding: 20px; border-radius: 12px;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: border-color 0.3s ease;
            border: 1px solid #333;
        }

        h3 { margin-top: 0; color: #00b0ff; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 8px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 0.85rem; }

        input[type="number"], input[type="password"], select, input[type="text"] {
            width: 100%; padding: 12px; background-color: var(--input-bg);
            border: 2px solid #333; border-radius: 8px; color: #fff; font-size: 1.1rem; box-sizing: border-box;
        }

        .btn-link {
            background: #00b0ff; color: #121212; display: flex; justify-content: center;
            align-items: center; gap: 8px; text-decoration: none; font-weight: bold;
            padding: 12px; border-radius: 8px; font-size: 1rem; margin-bottom: 20px;
            box-sizing: border-box;
        }

        .upload-zone {
            border: 2px dashed #00e676; padding: 20px; border-radius: 8px;
            text-align: center; background: rgba(0, 230, 118, 0.05); cursor: pointer; margin-bottom: 15px;
        }
        .upload-zone i { font-size: 2rem; color: #00e676; margin-bottom: 8px; }
        #preview-img { max-width: 100%; max-height: 150px; margin-top: 10px; border-radius: 6px; display: none; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-save { background: linear-gradient(90deg, #00b0ff, #d500f9); color: #fff; }
        .btn-ai-scan { background: #00b0ff; color: #121212; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 15px; }

        .tool-result-zone { margin-top: 20px; padding: 15px; border-radius: 10px; background-color: #151515; border: 1px solid var(--status-color); }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
        .res-val { font-weight: bold; font-family: monospace; font-size: 1.2rem; }

        .chat-container { background-color: #151515; border: 1px solid #333; border-radius: 12px; height: 320px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-timeline { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; line-height: 1.4; }
        .bubble.bnf { background: #2a2a2a; color: #eee; align-self: flex-start; border-left: 3px solid #00b0ff; }
        .bubble.user { background: var(--primary-color); color: #121212; align-self: flex-end; font-weight: bold; }
        .chat-input-zone { display: flex; padding: 10px; gap: 8px; background: #1e1e1e; }

        .log-item { background: #151515; border-left: 4px solid #ff5252; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85rem; }
        #ocr-status, #market-ai-status { text-align: center; font-size: 0.85rem; margin-top: 6px; font-weight: bold; }

        .key-input-row { display: flex; gap: 6px; }
        .key-eye-btn {
            background: #333; color: #fff; border: none; border-radius: 8px;
            padding: 0 14px; cursor: pointer; font-size: 1rem;
        }
        .key-connected-row {
            display: none; align-items: center; gap: 8px; margin-bottom: 10px;
            font-size: 0.85rem; color: var(--text-muted);
        }
        .key-change-btn {
            background: none; border: none; color: #00b0ff; text-decoration: underline;
            cursor: pointer; font-size: 0.8rem; padding: 0;
        }

        .score-display-zone {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #333;
        }
        .score-num {
            font-size: 3rem;
            font-weight: 900;
            font-family: monospace;
            line-height: 1;
            margin-bottom: 5px;
            transition: color 0.3s ease;
        }
        .score-label {
            font-size: 1.1rem;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .factor-select-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
    </style>
    
    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        window.GoogleGenerativeAI = GoogleGenerativeAI;
    </script>
</head>
<body>

    <header id="app-title">MARKET SCORE</header>

    <div class="content-area">
        <div id="screen-market" class="screen active">
            <div class="card" id="market-card">
                <h3>現在の市場環境をチェック</h3>
                
                <button class="btn btn-ai-scan" onclick="fetchLiveMarketWithAI()">
                    <i class="fa-solid fa-cloud-sun"></i> AIリアルタイム地合い自動入力
                </button>
                <div id="market-ai-status"></div>

                <div class="score-display-zone" style="margin-top: 15px; margin-bottom: 20px;">
                    <div class="score-num" id="live-score">50点</div>
                    <div class="score-label" id="live-status">ニュートラル</div>
                </div>

                <div class="factor-select-group">
                    <div class="input-group">
                        <label>① 指数（日経平均・TOPIX）の下落度合い</label>
                        <select id="check-index" onchange="autoCalculateMarket()">
                            <option value="30">上昇している、またはヨコヨコで安定している</option>
                            <option value="20" selected>少し下がっている（前日比 -1% 前後の一時的な調整）</option>
                            <option value="10">かなり下がっている（前日比 -2%〜-3% 以上の明確な急落）</option>
                            <option value="0">パニック暴落（前日比 -4% 以上、または数日連続の大暴落）</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>② 値下がり銘柄数の割合（パニック度）</label>
                        <select id="check-stocks" onchange="autoCalculateMarket()">
                            <option value="30">値上がり銘柄の方が多い、またはトントン</option>
                            <option value="20" selected>値下がり銘柄がやや多い（全体の 60% 程度が下落）</option>
                            <option value="10">全面安に近い（全体の 80% 以上が下落。画面がほぼ真っ赤）</option>
                            <option value="0">完全なパニック（全体の 90% 以上が値下がり。逃げ場なし）</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>③ 主力株（半導体や大型株）の連動性</label>
                        <select id="check-leaders" onchange="autoCalculateMarket()">
                            <option value="40">主力株はしっかり買われている、または耐えている</option>
                            <option value="20" selected>業種ごとにマチマチ（一部の銘柄だけが下がっている）</option>
                            <option value="0">主力株も全滅（レーザーテック等の主要銘柄も一緒に投げられている）</option>
                        </select>
                    </div>
                </div>

                <div class="bnf-coach-box" style="margin-top:25px; color:var(--text-muted); font-size:0.9rem; border-top: 1px solid #333; padding-top: 15px;">
                    B.N.Fの視点: <span id="bnf-comment-text">「……。普通ですね」</span>
                </div>
            </div>
        </div>

        <div id="screen-tools" class="screen">
            <div class="card">
                <h3>動的URL表示 ＆ スクショ自動判定</h3>
                
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <div style="flex:1;">
                        <label style="color:#00b0ff; font-weight:bold;">① 銘柄コード入力</label>
                        <input type="number" id="stock-code" placeholder="例: 6920" oninput="updateYahooLink(this.value)">
                    </div>
                    <div style="flex:1;">
                        <label>セクター</label>
                        <select id="stock-sector" onchange="calculateMetrics()">
                            <option value="heavy">バリュー</option>
                            <option value="tech" selected>ハイテク・半導体</option>
                            <option value="defensive">内需</option>
                            <option value="growth">新興グロース</option>
                        </select>
                    </div>
                </div>

                <div id="link-zone"></div>

                <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                    <i class="fa-solid fa-camera"></i>
                    <div style="font-size:0.9rem; font-weight:bold;">② チャートのスクショを選択・撮影</div>
                    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleImageUpload(this)">
                    <img id="preview-img" alt="プレビュー">
                </div>
                <div id="ocr-status"></div>

                <div class="input-group" style="margin-top:20px;">
                    <label style="color:#00b0ff;">25日移動平均線 (手動修正も可能)</label>
                    <input type="number" id="ma-value" placeholder="スクショから自動読取" oninput="calculateMetrics()">
                </div>

                <div class="input-group">
                    <label style="color:#00e676;">現在のリアルタイム株価 (手動修正も可能)</label>
                    <input type="number" id="current-price" placeholder="スクショから自動読取" oninput="calculateMetrics()">
                </div>

                <div class="tool-result-zone" id="tool-result">
                    <div class="result-row"><span>乖離率</span><span class="res-val" id="res-kairi">-- %</span></div>
                    <div class="result-row"><span>判定</span><span class="res-val" id="res-status">未入力</span></div>
                    <div class="result-row"><span>地合い調整後しきい値</span><span class="res-val" id="res-threshold" style="font-size:0.9rem;">--</span></div>
                </div>
                <button class="btn btn-save" onclick="saveTradeLog()"><i class="fa-solid fa-floppy-disk"></i> ログに保存</button>
            </div>
        </div>

        <div id="screen-brain" class="screen">
            <div class="card" style="padding:10px;">
                <h3>BNF AI COACH</h3>

                <div id="api-key-setup" style="margin-bottom:10px;">
                    <div class="key-input-row">
                        <input type="password" id="api-key-input" placeholder="Gemini APIキーを入力">
                        <button type="button" class="key-eye-btn" onclick="toggleKeyVisibility()">
                            <i class="fa-solid fa-eye" id="key-eye-icon"></i>
                        </button>
                    </div>
                    <button onclick="saveApiKey()" class="btn" style="background:var(--primary-color);">接続</button>
                </div>

                <div id="api-key-connected" class="key-connected-row">
                    <i class="fa-solid fa-circle-check" style="color:#00e676;"></i>
                    <span>APIキー接続済み</span>
                    <button class="key-change-btn" onclick="changeApiKey()">変更する</button>
                </div>

                <div class="chat-container">
                    <div class="chat-timeline" id="chat-box">
                        <div class="bubble bnf">こんにちは。何かご相談はありますか？</div>
                    </div>
                    <div class="chat-input-zone">
                        <input type="text" id="chat-input" placeholder="相談を入力..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                        <button onclick="sendChatMessage()" style="border:none; background:none; color:var(--primary-color); font-size:1.2rem;"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-log" class="screen">
            <div class="card">
                <h3>ログ分析</h3>
                <div id="log-container"></div>
                <button class="btn" style="background:#cf6679; margin-top:20px;" onclick="clearLogs()">リセット</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchScreen('market', this)"><i class="fa-solid fa-earth-asia"></i><span>地合い</span></div>
        <div class="nav-item" onclick="switchScreen('tools', this)"><i class="fa-solid fa-screwdriver-wrench"></i><span>ツール</span></div>
        <div class="nav-item" onclick="switchScreen('brain', this)"><i class="fa-solid fa-brain"></i><span>AI</span></div>
        <div class="nav-item" onclick="switchScreen('log', this)"><i class="fa-solid fa-chart-line"></i><span>ログ</span></div>
    </div>

    <script>
        let currentMarketScore = 50;
        let geminiApiKey = localStorage.getItem("gemini_api_key") || "";
        let compressedBase64 = "";

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        function updateYahooLink(code) {
            const linkZone = document.getElementById('link-zone');
            if(code && code.length === 4) {
                linkZone.innerHTML = `
                    <a href="https://finance.yahoo.co.jp/quote/${encodeURIComponent(code)}" target="_blank" class="btn-link">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> ${escapeHtml(code)} のYahoo!株価詳細を開く
                    </a>
                `;
            } else {
                linkZone.innerHTML = "";
            }
        }

        function switchScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            el.classList.add('active');
            if(id === 'log') renderLogs();
        }

        async function fetchLiveMarketWithAI() {
            const statusEl = document.getElementById('market-ai-status');
            if (!geminiApiKey) { alert("AIタブでAPIキーを設定してください。"); return; }
            statusEl.innerText = "本日の相場を検索・分析中...";
            statusEl.style.color = "#00b0ff";

            try {
                const genAI = new window.GoogleGenerativeAI(geminiApiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash", tools: [{ googleSearch: {} }] });
                const prompt = `現在の日本の株式市場（日経平均、TOPIX、東証プライムの騰落銘柄数、主力大型株の最新の動き）を検索して状況を確認してください。
状況に合致する選択肢の数値をそれぞれ選び、以下のJSONフォーマットのみで出力してください。挨拶等は不要です。
{"index": "30or20or10or0", "stocks": "30or20or10or0", "leaders": "40or20or0"}`;

                const result = await model.generateContent(prompt);
                const jsonMatch = result.response.text().match(/\{[\s\S]*?\}/);
                if (jsonMatch) {
                    const data = JSON.parse(jsonMatch[0]);
                    if (data.index) document.getElementById('check-index').value = data.index;
                    if (data.stocks) document.getElementById('check-stocks').value = data.stocks;
                    if (data.leaders) document.getElementById('check-leaders').value = data.leaders;
                    autoCalculateMarket();
                    statusEl.innerText = "同期完了しました。";
                    statusEl.style.color = "#00e676";
                }
            } catch (e) { statusEl.innerText = "同期失敗しました。"; statusEl.style.color = "#ff5252"; }
        }

        function autoCalculateMarket() {
            const idxVal = parseInt(document.getElementById('check-index').value, 10);
            const stkVal = parseInt(document.getElementById('check-stocks').value, 10);
            const ledVal = parseInt(document.getElementById('check-leaders').value, 10);
            currentMarketScore = idxVal + stkVal + ledVal;
            uiUpdateMarket(currentMarketScore);
        }

        // --- 地合い画面のコメント（※ここはB.N.Fの視点として口調を維持します） ---
        function uiUpdateMarket(score) {
            document.getElementById('live-score').innerText = score + "点";
            const statusEl = document.getElementById('live-status');
            const commentEl = document.getElementById('bnf-comment-text');
            const scoreNumEl = document.getElementById('live-score');
            const marketCard = document.getElementById('market-card');
            
            let status, comment, color, cardBorder;
            if (score >= 80) { status = "過熱・上昇（逆張り厳禁）"; comment = "「みんな儲かってる時って、一番危ないんですよね」"; color = "#ff5252"; cardBorder = "rgba(255, 82, 82, 0.3)"; }
            else if (score >= 60) { status = "やや楽観・通常"; comment = "「まあ、悪くはないですが、わざわざここで買う必要もないですね」"; color = "#ffb300"; cardBorder = "rgba(255, 179, 0, 0.3)"; }
            else if (score >= 40) { status = "ニュートラル"; comment = "「……。普通ですね。しっかり引き付けないとやられます」"; color = "#888888"; cardBorder = "#333"; }
            else if (score >= 20) { status = "警戒・連れ安発生"; comment = "「いい感じに投げが出てきましたね。そろそろ面白くなってきました」"; color = "#00b0ff"; cardBorder = "rgba(0, 176, 255, 0.3)"; }
            else { status = "極度のパニック（大チャンス）"; comment = "「みんなが恐怖で投げてる時が、一番美味しいんですよ」"; color = "#00e676"; cardBorder = "rgba(0, 230, 118, 0.4)"; }

            statusEl.innerText = status; statusEl.style.color = color; scoreNumEl.style.color = color;
            marketCard.style.borderColor = cardBorder; commentEl.innerText = comment;
            calculateMetrics();
        }

        function handleImageUpload(input) {
            const file = input.files[0]; if (!file) return;
            if (!file.type.startsWith('image/')) { alert("画像ファイルを選択してください。"); input.value = ""; return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const MAX_WIDTH = 1024;
                    let width = img.width; let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    compressedBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                    parseImageWithAI();
                }; img.src = e.target.result;
            }; reader.readAsDataURL(file);
        }

        async function parseImageWithAI() {
            const status = document.getElementById('ocr-status');
            if (!geminiApiKey) return;
            status.innerText = "AIが画像をスキャン中..."; status.style.color = "#00b0ff";
            try {
                const genAI = new window.GoogleGenerativeAI(geminiApiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });
                const prompt = `チャート画像から、現在の株価の数値と、25日移動平均線の数値を読み取り、以下のJSONフォーマットのみで返答してください。説明文不要。{"price": 株価, "ma": 25日線}`;
                const imagePart = { inlineData: { data: compressedBase64, mimeType: "image/jpeg" } };
                const result = await model.generateContent([prompt, imagePart]);
                const jsonMatch = result.response.text().match(/\{[\s\S]*?\}/);
                if(jsonMatch) {
                    const data = JSON.parse(jsonMatch[0]);
                    if(data.price) document.getElementById('current-price').value = Math.round(data.price);
                    if(data.ma) document.getElementById('ma-value').value = Math.round(data.ma);
                    calculateMetrics();
                    status.innerText = "自動入力に成功しました。"; status.style.color = "#00e676";
                }
            } catch (e) { status.innerText = "スキャン失敗しました。"; status.style.color = "#ff5252"; }
        }

        function calculateMetrics() {
            const ma = parseFloat(document.getElementById('ma-value').value);
            const price = parseFloat(document.getElementById('current-price').value);
            if(!ma || !price) { document.getElementById('res-kairi').innerText = "-- %"; document.getElementById('res-status').innerText = "未入力"; return; }
            const kairi = ((price - ma) / ma) * 100; document.getElementById('res-kairi').innerText = kairi.toFixed(2) + " %";
            const marketAdjustment = (currentMarketScore - 50) / 10;
            const thresholdWarning = -8 - marketAdjustment; const thresholdBuy = -15 - marketAdjustment;
            let status = "静観（バネ未収縮）"; let color = "#888";
            if (kairi < thresholdBuy) { status = "限界突破（買いゾーン）"; color = "#00e676"; }
            else if (kairi < thresholdWarning) { status = "チャンス目前（監視）"; color = "#ffb300"; }
            document.getElementById('res-status').innerText = status; document.getElementById('res-status').style.color = color;
            document.getElementById('res-threshold').innerText = `${thresholdWarning.toFixed(1)}% / ${thresholdBuy.toFixed(1)}%`;
        }

        function saveTradeLog() {
            const code = document.getElementById('stock-code').value;
            const kairi = document.getElementById('res-kairi').innerText;
            if(kairi === "-- %") return;
            const log = { time: new Date().toLocaleString(), code: code || "不明", kairi: kairi, status: document.getElementById('res-status').innerText };
            let logs = JSON.parse(localStorage.getItem("bnf_logs") || "[]");
            logs.unshift(log); localStorage.setItem("bnf_logs", JSON.stringify(logs));
            alert("保存しました");
        }

        function renderLogs() {
            const container = document.getElementById('log-container');
            const logs = JSON.parse(localStorage.getItem("bnf_logs") || "[]");
            if(logs.length === 0) { container.innerHTML = "<p style='color:#aaa; text-align:center;'>ログはありません</p>"; return; }
            container.innerHTML = logs.map(l => `
                <div class="log-item">
                    <div style="color:#aaa; font-size:0.75rem;">${escapeHtml(l.time)}</div>
                    <div style="font-weight:bold; color:#00b0ff; margin:3px 0;">銘柄: ${escapeHtml(l.code)}</div>
                    <div style="font-weight:bold; font-size:1.1rem;">乖離率: ${escapeHtml(l.kairi)} (${escapeHtml(l.status)})</div>
                </div>
            `).join('');
        }

        function clearLogs() { if(confirm("すべてリセットしますか？")) { localStorage.removeItem("bnf_logs"); renderLogs(); } }
        function toggleKeyVisibility() {
            const input = document.getElementById('api-key-input'); const icon = document.getElementById('key-eye-icon');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
        }

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (!key) return; localStorage.setItem("gemini_api_key", key); geminiApiKey = key;
            document.getElementById('api-key-setup').style.display = 'none';
            document.getElementById('api-key-connected').style.display = 'flex';
        }

        function changeApiKey() { document.getElementById('api-key-setup').style.display = 'block'; document.getElementById('api-key-connected').style.display = 'none'; }

        // --- ここでAI COACHの口調（命令文）を修正します ---
        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            if(!input.value || !geminiApiKey) return;
            const userText = input.value;
            chatBox.innerHTML += `<div class="bubble user">${escapeHtml(userText)}</div>`; input.value = "";

            try {
                const genAI = new window.GoogleGenerativeAI(geminiApiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });
                
                // 命令文（システムプロンプト）を「丁寧なAI」に変更
                const prompt = `あなたは、株式投資の逆張り手法（25日移動平均線乖離率）に詳しい、親切で丁寧なAIコーチです。
現在の相場全体の地合いスコアは100点満点中【${currentMarketScore}点】です（点数が低いほどパニック状態＝逆張りのチャンス）。
ユーザーからの相談に対し、この地合い状況を踏まえて、分かりやすく、丁寧な「です・ます調」で回答してください。ボソボソとした話し方や「……」の多用は避けてください。
相談内容：${userText}`;

                const result = await model.generateContent(prompt);
                chatBox.innerHTML += `<div class="bubble bnf">${escapeHtml(result.response.text())}</div>`;
            } catch (e) { chatBox.innerHTML += `<div class="bubble bnf">申し訳ありません。エラーが発生しました。</div>`; }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.onload = () => {
            if(geminiApiKey) { document.getElementById('api-key-setup').style.display = 'none'; document.getElementById('api-key-connected').style.display = 'flex'; }
            autoCalculateMarket();
        };
    </script>
</body>
</html>
