<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNF COACHING APP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #2a2a2a;
            --primary-color: #d500f9; 
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --status-color: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            padding: 15px; text-align: center;
            font-size: 1.2rem; font-weight: bold;
            color: var(--primary-color);
            border-bottom: 1px solid #333;
        }

        .content-area {
            flex: 1; overflow-y: auto;
            padding: 20px; padding-bottom: 90px;
            box-sizing: border-box;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background-color: var(--card-bg); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #333; z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; color: var(--text-muted);
            font-size: 0.75rem; cursor: pointer; width: 25%;
        }
        .nav-item.active { color: var(--primary-color); }

        .card {
            background-color: var(--card-bg); padding: 20px; border-radius: 12px;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h3 { margin-top: 0; color: #00b0ff; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 8px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 0.85rem; }

        input[type="number"], select, input[type="text"] {
            width: 100%; padding: 12px; background-color: var(--input-bg);
            border: 2px solid #333; border-radius: 8px; color: #fff; font-size: 1.1rem; box-sizing: border-box;
        }

        .btn-link {
            background: #00b0ff; color: #121212; display: flex; justify-content: center;
            align-items: center; gap: 8px; text-decoration: none; font-weight: bold;
            padding: 12px; border-radius: 8px; font-size: 1rem; margin-bottom: 20px;
            box-sizing: border-box;
        }

        .upload-zone {
            border: 2px dashed #00e676; padding: 20px; border-radius: 8px;
            text-align: center; background: rgba(0, 230, 118, 0.05); cursor: pointer; margin-bottom: 15px;
        }
        .upload-zone i { font-size: 2rem; color: #00e676; margin-bottom: 8px; }
        #preview-img { max-width: 100%; max-height: 150px; margin-top: 10px; border-radius: 6px; display: none; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-save { background: linear-gradient(90deg, #00b0ff, #d500f9); color: #fff; }

        .tool-result-zone { margin-top: 20px; padding: 15px; border-radius: 10px; background-color: #151515; border: 1px solid var(--status-color); }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
        .res-val { font-weight: bold; font-family: monospace; font-size: 1.2rem; }

        .chat-container { background-color: #151515; border: 1px solid #333; border-radius: 12px; height: 320px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-timeline { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; line-height: 1.4; }
        .bubble.bnf { background: #2a2a2a; color: #eee; align-self: flex-start; border-left: 3px solid #00b0ff; }
        .bubble.user { background: var(--primary-color); color: #121212; align-self: flex-end; font-weight: bold; }
        .chat-input-zone { display: flex; padding: 10px; gap: 8px; background: #1e1e1e; }

        .log-item { background: #151515; border-left: 4px solid #ff5252; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85rem; }
        #ocr-status { text-align: center; font-size: 0.85rem; margin-top: 6px; font-weight: bold; }
    </style>
    
    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        window.GoogleGenerativeAI = GoogleGenerativeAI;
    </script>
</head>
<body>

    <header id="app-title">MARKET SCORE</header>

    <div class="content-area">
        <div id="screen-market" class="screen active">
            <div class="card">
                <h3>地合いコントロール</h3>
                <div class="score-display-zone" id="score-zone">
                    <div class="score-num" id="live-score">50点</div>
                    <div class="score-label" id="live-status">ニュートラル</div>
                </div>
                <input type="range" id="market-slider" min="0" max="100" value="50" style="width:100%; margin-top:20px;" oninput="manualMarketUpdate(this.value)">
                <div class="bnf-coach-box" style="margin-top:20px; color:var(--text-muted); font-size:0.9rem;">
                    B.N.F: <span id="bnf-comment-text">「……。普通ですね」</span>
                </div>
            </div>
        </div>

        <div id="screen-tools" class="screen">
            <div class="card">
                <h3>動的URL表示 ＆ スクショ自動判定</h3>
                
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <div style="flex:1;">
                        <label style="color:#00b0ff; font-weight:bold;">① 銘柄コード入力</label>
                        <input type="number" id="stock-code" placeholder="例: 6920" oninput="updateYahooLink(this.value)">
                    </div>
                    <div style="flex:1;">
                        <label>セクター</label>
                        <select id="stock-sector" onchange="calculateMetrics()">
                            <option value="heavy">バリュー</option>
                            <option value="tech" selected>ハイテク・半導体</option>
                            <option value="defensive">内需</option>
                            <option value="growth">新興グロース</option>
                        </select>
                    </div>
                </div>

                <div id="link-zone"></div>

                <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                    <i class="fa-solid fa-camera"></i>
                    <div style="font-size:0.9rem; font-weight:bold;">② チャートのスクショを選択・撮影</div>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-top:3px;">数値をポップアップ等で表示させた状態の画像がベストです</div>
                    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleImageUpload(this)">
                    <img id="preview-img" alt="プレビュー">
                </div>
                <div id="ocr-status"></div>

                <div class="input-group" style="margin-top:20px;">
                    <label style="color:#00b0ff;">📈 25日移動平均線 (手動修正も可能)</label>
                    <input type="number" id="ma-value" placeholder="スクショから自動読取" oninput="calculateMetrics()">
                </div>

                <div class="input-group">
                    <label style="color:#00e676;">💰 現在のリアルタイム株価 (手動修正も可能)</label>
                    <input type="number" id="current-price" placeholder="スクショから自動読取" oninput="calculateMetrics()">
                </div>

                <div class="tool-result-zone" id="tool-result">
                    <div class="result-row"><span>乖離率</span><span class="res-val" id="res-kairi">-- %</span></div>
                    <div class="result-row"><span>判定</span><span class="res-val" id="res-status">未入力</span></div>
                </div>
                <button class="btn btn-save" onclick="saveTradeLog()"><i class="fa-solid fa-floppy-disk"></i> ログに保存</button>
            </div>
        </div>

        <div id="screen-brain" class="screen">
            <div class="card" style="padding:10px;">
                <h3>BNF AI COACH</h3>
                <div id="api-key-setup" style="margin-bottom:10px;">
                    <input type="text" id="api-key-input" placeholder="Gemini APIキーを入力" style="font-size:0.8rem;">
                    <button onclick="saveApiKey()" class="btn" style="background:var(--primary-color); margin-top:5px;">接続</button>
                </div>
                <div class="chat-container">
                    <div class="chat-timeline" id="chat-box">
                        <div class="bubble bnf">「……。何かありますか」</div>
                    </div>
                    <div class="chat-input-zone">
                        <input type="text" id="chat-input" placeholder="相談を入力..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                        <button onclick="sendChatMessage()" style="border:none; background:none; color:var(--primary-color); font-size:1.2rem;"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-log" class="screen">
            <div class="card">
                <h3>ログ分析</h3>
                <div id="log-container"></div>
                <button class="btn" style="background:#cf6679; margin-top:20px;" onclick="clearLogs()">リセット</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchScreen('market', this)"><i class="fa-solid fa-earth-asia"></i><span>地合い</span></div>
        <div class="nav-item" onclick="switchScreen('tools', this)"><i class="fa-solid fa-screwdriver-wrench"></i><span>ツール</span></div>
        <div class="nav-item" onclick="switchScreen('brain', this)"><i class="fa-solid fa-brain"></i><span>AI</span></div>
        <div class="nav-item" onclick="switchScreen('log', this)"><i class="fa-solid fa-chart-line"></i><span>ログ</span></div>
    </div>

    <script>
        let currentMarketScore = 50;
        let geminiApiKey = localStorage.getItem("gemini_api_key") || "";
        let compressedBase64 = "";

        function updateYahooLink(code) {
            const linkZone = document.getElementById('link-zone');
            if(code && code.length === 4) {
                linkZone.innerHTML = `
                    <a href="https://finance.yahoo.co.jp/quote/${code}" target="_blank" class="btn-link">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> ${code} のYahoo!株価詳細を開く
                    </a>
                `;
            } else {
                linkZone.innerHTML = "";
            }
        }

        function switchScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            el.classList.add('active');
            if(id === 'log') renderLogs();
        }

        function manualMarketUpdate(val) {
            currentMarketScore = val;
            document.getElementById('live-score').innerText = val + "点";
            calculateMetrics();
        }

        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const preview = document.getElementById('preview-img');
            const status = document.getElementById('ocr-status');
            status.innerText = "画像を最適化中...";
            status.style.color = "#ffb300";

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1024;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    preview.src = canvas.toDataURL('image/jpeg', 0.8);
                    preview.style.display = "inline-block";
                    compressedBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                    
                    parseImageWithAI();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function parseImageWithAI() {
            const status = document.getElementById('ocr-status');
            if (!geminiApiKey) {
                alert("AIタブでGemini APIキーを設定してください。");
                return;
            }

            status.innerText = "AIがスクショ画像を精密スキャン中...";
            status.style.color = "#00b0ff";

            try {
                const genAI = new window.GoogleGenerativeAI(geminiApiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });

                const prompt = `この画像は株価チャート、または株価画面のスクリーンショットです。
画像内のすべてのテキストから、以下の2つの数値を読み取ってください。

1. 現在値または取引値、あるいは画面上で最も大きく目立っている現在の株価の数字。
2. 25日、25MA、移動平均(25)の横や、ポップアップで表示されている25日移動平均線の数字。

見つけた数値を以下のJSONフォーマットのみで返答してください。説明文は一切不要です。
{"price": 株価の数値, "ma": 25日線の数値}`;

                const imagePart = {
                    inlineData: {
                        data: compressedBase64,
                        mimeType: "image/jpeg"
                    }
                };

                const result = await model.generateContent([prompt, imagePart]);
                const responseText = result.response.text();
                
                const jsonMatch = responseText.match(/\{[\s\S]*?\}/);
                if(jsonMatch) {
                    const data = JSON.parse(jsonMatch[0]);
                    if(data.price) document.getElementById('current-price').value = Math.round(data.price);
                    if(data.ma) document.getElementById('ma-value').value = Math.round(data.ma);
                    
                    calculateMetrics();
                    status.innerText = "画像の読み込みに成功しました！";
                    status.style.color = "#00e676";
                } else {
                    status.innerText = "数字が一部見つかりません。下の白い枠を直接タップして手入力・修正してください。";
                    status.style.color = "#ffb300";
                }
            } catch (e) {
                console.error(e);
                status.innerText = "エラー：APIキーが正しいか、または画像が不鮮明な可能性があります。手入力も可能です。";
                status.style.color = "#ff5252";
            }
        }

        function calculateMetrics() {
            const ma = parseFloat(document.getElementById('ma-value').value);
            const price = parseFloat(document.getElementById('current-price').value);
            
            if(!ma || !price) {
                document.getElementById('res-kairi').innerText = "-- %";
                document.getElementById('res-status').innerText = "未入力";
                return;
            }

            const kairi = ((price - ma) / ma) * 100;
            document.getElementById('res-kairi').innerText = kairi.toFixed(2) + " %";

            let status = "静観（バネ未収縮）";
            let color = "#888";
            
            if(kairi < -15) { status = "限界突破（BNF買いゾーン）"; color = "#00e676"; }
            else if(kairi < -8) { status = "チャンス目前（監視）"; color = "#ffb300"; }
            
            const resZone = document.getElementById('res-status');
            resZone.innerText = status;
            resZone.style.color = color;
        }

        function saveTradeLog() {
            const code = document.getElementById('stock-code').value;
            const kairi = document.getElementById('res-kairi').innerText;
            if(kairi === "-- %") return;

            const log = {
                time: new Date().toLocaleString(),
                code: code || "不明",
                kairi: kairi,
                status: document.getElementById('res-status').innerText
            };
            let logs = JSON.parse(localStorage.getItem("bnf_logs") || "[]");
            logs.unshift(log);
            localStorage.setItem("bnf_logs", JSON.stringify(logs));
            alert("保存しました");
        }

        function renderLogs() {
            const container = document.getElementById('log-container');
            const logs = JSON.parse(localStorage.getItem("bnf_logs") || "[]");
            if(logs.length === 0) {
                container.innerHTML = "<p style='color:#aaa; text-align:center;'>ログはありません</p>";
                return;
            }
            container.innerHTML = logs.map(l => `
                <div class="log-item">
                    <div style="color:#aaa; font-size:0.75rem;">${l.time}</div>
                    <div style="font-weight:bold; color:#00b0ff; margin:3px 0;">銘柄: ${l.code}</div>
                    <div style="font-weight:bold; font-size:1.1rem;">乖離率: ${l.kairi} (${l.status})</div>
                </div>
            `).join('');
        }

        function clearLogs() {
            if(confirm("すべてリセットしますか？")) {
                localStorage.removeItem("bnf_logs");
                renderLogs();
            }
        }

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value;
            localStorage.setItem("gemini_api_key", key);
            geminiApiKey = key;
            document.getElementById('api-key-setup').style.display = 'none';
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            if(!input.value || !geminiApiKey) return;

            const userText = input.value;
            chatBox.innerHTML += `<div class="bubble user">${userText}</div>`;
            input.value = "";

            try {
                const genAI = new window.GoogleGenerativeAI(geminiApiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });
                const result = await model.generateContent(`あなたはBNFです。地合いスコア${currentMarketScore}点。ボソボソと答えて。：${userText}`);
                chatBox.innerHTML += `<div class="bubble bnf">${result.response.text()}</div>`;
            } catch (e) { chatBox.innerHTML += `<div class="bubble bnf">……。エラー。</div>`; }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.onload = () => { if(geminiApiKey) document.getElementById('api-key-setup').style.display='none'; };
    </script>
</body>
</html>
